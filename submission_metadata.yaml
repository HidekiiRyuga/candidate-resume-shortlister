ai_usage_summary: |
  ChatGPT was used for debugging, code refinement, and documentation.
  The team implemented, tested, validated, and finalized the solution.

methodology_summary: |
  Our system uses a two-stage candidate ranking pipeline optimized for CPU-only
  execution. Candidate profiles are first processed using feature extraction to
  score skills, experience, achievements, job titles, and recruiter signals.
  A fast heuristic scoring stage filters the candidate pool to the top-K
  candidates. These candidates are then reranked using semantic similarity
  between the job description and candidate profiles together with weighted
  feature scores and domain-specific bonuses for AI skills such as retrieval,
  ranking, embeddings, evaluation, and vector database experience. Final scores
  are normalized into a deterministic ranking with candidate ID tie-breaking,
  and concise explanations are generated directly from candidate attributes
  without hallucinating information. The complete pipeline is reproducible,
  requires no external APIs during ranking, and runs entirely on CPU.

